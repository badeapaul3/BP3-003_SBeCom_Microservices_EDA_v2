spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/orderdb #or embarkx to use the db automatically created and assoc with the user
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    database: PostgreSQL
    show-sql: true
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
