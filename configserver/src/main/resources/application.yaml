spring:
  application:
    name: configserver
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: file:///C:\Users\hatzp\Desktop\Programming\EX_Microservices_ecom\configserver\src\main\resources\config
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
